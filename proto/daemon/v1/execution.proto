syntax = "proto3";

import "daemon/v1/shared.proto";
import "workflow/v1/bundle.proto";

package utos.daemon.v1;

option csharp_namespace = "Utos.Daemon.V1";

// ============================================================================
// Execution Lifecycle Service
// ============================================================================

service ExecutionService {
  // Schedule a new workflow execution
  rpc ScheduleExecution(ScheduleExecutionRequest) returns (ScheduleExecutionResponse);

  // Get detailed execution information
  rpc GetExecution(GetExecutionRequest) returns (GetExecutionResponse);

  // List all executions
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);

  // Delete a terminal execution's record (its summary, input/env, and the
  // snapshotted bundle). Permitted only when the execution is terminal
  // (COMPLETED or FAILED); a SCHEDULED or ACTIVE execution returns
  // FAILED_PRECONDITION and must be cancelled first (cancellation is a separate
  // concern, not yet defined). Unknown execution_id returns NOT_FOUND. Does not
  // affect any detached sub-workflow executions this run started — those are
  // independent top-level executions with their own records.
  rpc DeleteExecution(DeleteExecutionRequest) returns (DeleteExecutionResponse);
}

// ============================================================================
// Request/Response Messages
// ============================================================================

message ScheduleExecutionRequest {
  // Reference to a workflow previously loaded via DefinitionService.LoadWorkflow.
  // name is required; version omitted means "latest loaded". Optional digest
  // pins the run to exact bundle content: the daemon resolves name(+version),
  // then requires the resolved digest to match, failing the schedule on
  // mismatch — so a caller can guarantee it scheduled the exact content it
  // intended even if the store was re-loaded.
  WorkflowReference workflow = 1;

  // Input data passed to the start activity
  ExecutionPayload input = 2;

  // Name of the activity to start workflow execution from
  // Must match a key in workflow.spec.activities map
  string start_activity = 3;

  // Ambient environment for this run: config available to ALL activities via
  // {{ env.x }} template expressions (e.g. API base URLs, region, feature
  // flags), as opposed to `input`, which reaches only the start activity.
  // Non-secret only — secrets are resolved outside the daemon from a 3rd-party
  // provider, never passed here.
  map<string, string> env = 4;
}

message ScheduleExecutionResponse {
  // Unique execution identifier
  string id = 1;

  // Current execution status
  ExecutionStatus status = 2;
}

message GetExecutionRequest {
  // Unique execution identifier
  string execution_id = 1;
}

message GetExecutionResponse {
  // Former flat fields, now provided via the embedded `summary`.
  reserved 1, 2, 3, 4, 7, 8, 9, 10, 11, 12, 13, 14, 16;
  reserved "id", "status", "workflow", "created_at", "scheduled_at",
    "started_at", "completed_at", "failed_at", "error",
    "workflow_version", "workflow_namespace", "workflow_registry", "error_message";

  // Summary view: identity, status, timing, and error for this execution.
  ExecutionSummary summary = 17;

  // Full workflow bundle (snapshotted at schedule time — unaffected by later
  // unload). `summary.workflow.digest` is the content identity of this exact
  // bundle; the two are guaranteed consistent within a single response.
  utos.workflow.v1.WorkflowBundle bundle = 5;

  // Execution input (data passed to the start activity).
  optional ExecutionPayload input = 6;

  // Ambient environment this execution ran with (echoed back like `input`;
  // non-secret only). Empty if none was provided.
  map<string, string> env = 15;
}

message ListExecutionsRequest {
  // Filter to executions of a single workflow. When set, name selects the
  // workflow; version omitted matches all loaded versions. When digest is set,
  // filter to executions whose snapshotted content matches that exact digest —
  // more precise than the mutable version (e.g. every run of one specific build).
  // Future: Add pagination.
  optional WorkflowReference workflow = 1;
}

message ListExecutionsResponse {
  // Array of execution summaries
  repeated ExecutionSummary executions = 1;
}

message DeleteExecutionRequest {
  // Unique execution identifier
  string execution_id = 1;
}

message DeleteExecutionResponse {
  // Empty; reserved for future fields.
}
