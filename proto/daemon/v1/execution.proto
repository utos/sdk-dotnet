syntax = "proto3";

import "daemon/v1/shared.proto";
import "workflow/v1/bundle.proto";
import "google/protobuf/timestamp.proto";

package utos.daemon.v1;

option csharp_namespace = "Utos.Daemon.V1";

// ============================================================================
// Execution Lifecycle Service
// ============================================================================

service ExecutionService {
  // Schedule a new workflow execution
  rpc ScheduleExecution(ScheduleExecutionRequest) returns (ScheduleExecutionResponse);

  // Get detailed execution information
  rpc GetExecution(GetExecutionRequest) returns (GetExecutionResponse);

  // List all executions
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
}

// ============================================================================
// Request/Response Messages
// ============================================================================

message ScheduleExecutionRequest {
  // Reference to a workflow previously loaded via DefinitionService.LoadWorkflow.
  // name is required; version omitted means "latest loaded".
  WorkflowReference workflow = 1;

  // Input data passed to the start activity
  ExecutionPayload input = 2;

  // Name of the activity to start workflow execution from
  // Must match a key in workflow.spec.activities map
  string start_activity = 3;

  // Ambient environment for this run: config available to ALL activities via
  // {{ env.x }} template expressions (e.g. API base URLs, region, feature
  // flags), as opposed to `input`, which reaches only the start activity.
  // Non-secret only — secrets are resolved outside the daemon from a 3rd-party
  // provider, never passed here.
  map<string, string> env = 4;
}

message ScheduleExecutionResponse {
  // Unique execution identifier
  string id = 1;

  // Current execution status
  ExecutionStatus status = 2;
}

message GetExecutionRequest {
  // Unique execution identifier
  string execution_id = 1;
}

message GetExecutionResponse {
  // Former flat workflow_* identity fields, now folded into `workflow`.
  reserved 4, 13, 14;
  reserved "workflow_version", "workflow_namespace", "workflow_registry";

  // Unique execution identifier
  string id = 1;

  // Current execution status
  ExecutionStatus status = 2;

  // Identity of the workflow this execution ran, as resolved at schedule time
  // (version always populated).
  WorkflowReference workflow = 3;

  // Full workflow bundle (snapshotted at schedule time — unaffected by later unload)
  utos.workflow.v1.WorkflowBundle bundle = 5;

  // Execution input (data passed to start activity)
  optional ExecutionPayload input = 6;

  // Ambient environment this execution ran with (echoed back like `input`;
  // non-secret only). Empty if none was provided.
  map<string, string> env = 15;

  // When the execution was created
  google.protobuf.Timestamp created_at = 7;

  // When the execution was scheduled
  optional google.protobuf.Timestamp scheduled_at = 8;

  // When the execution started (became ACTIVE)
  optional google.protobuf.Timestamp started_at = 9;

  // When the execution completed
  optional google.protobuf.Timestamp completed_at = 10;

  // When the execution failed
  optional google.protobuf.Timestamp failed_at = 11;

  // Error message if execution failed
  optional string error_message = 12;
}

message ListExecutionsRequest {
  // Filter to executions of a single workflow. When set, name selects the
  // workflow; version omitted matches all loaded versions.
  // Future: Add pagination.
  optional WorkflowReference workflow = 1;
}

message ListExecutionsResponse {
  // Array of execution summaries
  repeated ExecutionSummary executions = 1;
}
