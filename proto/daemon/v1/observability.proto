syntax = "proto3";

import "daemon/v1/shared.proto";
import "workflow/v1/common.proto";
import "google/protobuf/timestamp.proto";

package utos.daemon.v1;

option csharp_namespace = "Utos.Daemon.V1";

// ============================================================================
// Observability Service (Streaming + Health)
// ============================================================================

service ObservabilityService {
  // Watch execution events with streaming
  rpc WatchExecution(WatchExecutionRequest) returns (stream WatchExecutionResponse);

  // Check daemon health
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
}

// ============================================================================
// Watch Execution
// ============================================================================

message WatchExecutionRequest {
  // Unique execution identifier
  string execution_id = 1;

  // Filter by source name
  optional string source = 2;

  // Filter by category
  optional string category = 3;

  // Minimum log level (higher severity)
  optional LogLevel level = 4;

  // Where to start streaming from within the execution's event log.
  oneof position {
    // The last N events.
    int32 tail = 5;

    // Events after this event index.
    int32 after = 6;
  }
}

message WatchExecutionResponse {
  string source = 1;
  optional string category = 2;
  LogLevel level = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;

  // Only set when execution status transitions
  optional ExecutionStatus status = 6;

  // Structured failure details; set on the transition to FAILED.
  optional utos.workflow.v1.WorkflowError error = 7;
}

enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  LOG_LEVEL_TRACE = 1;
  LOG_LEVEL_DEBUG = 2;
  LOG_LEVEL_INFO = 3;
  LOG_LEVEL_WARN = 4;
  LOG_LEVEL_ERROR = 5;
  LOG_LEVEL_FATAL = 6;
}

// ============================================================================
// Health
// ============================================================================

message GetHealthRequest {
  // Empty for now
}

message GetHealthResponse {
  // Service health status
  HealthStatus status = 1;

  // Service version
  string version = 2;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_UNHEALTHY = 2;
}
