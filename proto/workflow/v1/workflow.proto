syntax = "proto3";

import "workflow/v1/activity.proto";

package utos.workflow.v1;

option csharp_namespace = "Utos.Workflow.V1";

// ============================================================================
// Metadata Definitions
// ============================================================================

// Workflow metadata and versioning information
//
// Together these fields form the workflow's identity, Docker-style:
// "[registry/][namespace/]name:version". A locally-authored workflow is just
// "name:version"; it gains "namespace/" and "registry/" prefixes only once it
// has a registry home. Both prefixes are optional and independent.
message WorkflowMetadata {
  // Workflow name/identifier (e.g., "send-email", "process-payment")
  // Must follow naming convention: lowercase, alphanumeric, hyphens allowed
  string name = 1;

  // Semantic version for this workflow
  string version = 2;

  // Human-readable description
  optional string description = 3;

  // Namespace qualifier (e.g., "google" in "google/gmail:v1.0.0"). Omitted for
  // local/unpublished workflows.
  optional string namespace = 4;

  // Registry the workflow is published to (e.g., "registry.utos.dev"). Omitted
  // for local/unpublished workflows.
  optional string registry = 5;
}

// ============================================================================
// Workflow Specification
// ============================================================================

// A complete Utos workflow specification
message Workflow {
  // API group and spec version this document conforms to, as "group/version"
  // (e.g. "utos.io/v1"): the group namespaces Utos kinds, the version is a
  // coarse schema generation mirroring the proto package major — not a semver,
  // and distinct from WorkflowMetadata.version (the workflow's own version).
  // Currently: "utos.io/v1".
  string api_version = 1;

  // Resource kind within the api_version group, a bare PascalCase noun.
  // Currently: "Workflow".
  string kind = 2;

  // Workflow metadata
  WorkflowMetadata metadata = 3;

  // Workflow specification
  WorkflowSpec spec = 4;
}

// Complete workflow definition
message WorkflowSpec {
  // Source-format dependency declarations: each entry binds an alias to a
  // sub-workflow reference.
  // Key: an alias, local to this workflow, that its activities use to name the
  //   dependency (e.g., "emailer").
  // Value: a reference to the dependency — either:
  //   - Registry ref: "registry.example.com/namespace/name:version"
  //   - Local file: "./path/to/workflow.yaml" (starts with ./ or ../)
  // In the built bundle, activities name dependencies by canonical identity
  // (see WorkflowBundle.workflows).
  map<string, string> dependencies = 1;

  // Map of activity name to activity definition. Activity names (the keys) are
  // referenced by TransitionTarget.name; the terminal keywords "end" and "error"
  // are reserved and may not be used as activity names.
  map<string, WorkflowActivity> activities = 2;
}
